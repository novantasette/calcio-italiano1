<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Calcio Italiano</title>
  <style>
    :root{
      --bg:#06101a;--bg2:#0b1625;--panel:#0f1b2d;--panel2:#13243b;--panel3:#0c1727;--text:#f6f8fc;--muted:#9eb1c8;
      --line:rgba(255,255,255,.08);--line-strong:rgba(255,255,255,.14);--green:#33d17a;--yellow:#ffcf57;--red:#ff6464;
      --blue:#66aefc;--shadow:0 18px 42px rgba(0,0,0,.24);--radius:22px
    }
    *{box-sizing:border-box} html,body{margin:0;padding:0}
    body{font-family:Inter,Arial,Helvetica,sans-serif;background:radial-gradient(circle at top, #10233d 0%, var(--bg) 34%, #040b13 100%);color:var(--text);cursor:auto}
    *{scrollbar-width:thin;scrollbar-color:#2e5f93 #091525}
    *::-webkit-scrollbar{width:12px;height:12px}
    *::-webkit-scrollbar-track{background:#091525}
    *::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#1d5b8f,#0f8f63);border-radius:999px;border:2px solid #091525}
    *::-webkit-scrollbar-thumb:hover{background:linear-gradient(180deg,#2b78bb,#19a974)}
    button,input{font:inherit} a{color:inherit}
    .topbar{position:sticky;top:0;z-index:40;display:flex;justify-content:space-between;gap:16px;align-items:center;padding:14px 22px;background:rgba(6,16,26,.88);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
    .brand-inline{display:flex;align-items:center;gap:12px;min-width:0;cursor:pointer}
    .logo{width:52px;height:52px;border-radius:16px;display:grid;place-items:center;overflow:hidden;background:linear-gradient(180deg,#0f2238,#09131f);border:1px solid rgba(255,255,255,.12);box-shadow:var(--shadow);flex:0 0 auto}
    .logo img{display:block;width:100%;height:100%;object-fit:cover}
    .brand-inline h1{margin:0;font-size:1.05rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .brand-inline small{display:block;color:var(--muted);margin-top:2px}
    .topnav{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    a,button,[role='button'],.linklike,.match,.directory-card,.subs button,.top-card,.brand-inline,.tabs button,.mini-tabs button,.subnav button,.hamburger,.sidebar-toggle{cursor:pointer}
    .topbar-actions{display:flex;align-items:center;gap:10px}
    .hamburger,.sidebar-toggle{display:none;align-items:center;justify-content:center;width:46px;height:46px;border-radius:14px;border:1px solid var(--line);background:linear-gradient(180deg,#0d1929,#0a1422);color:var(--text);cursor:pointer}
    .topnav button{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(180deg,#0d1929,#0a1422);border:1px solid var(--line);color:var(--text);padding:10px 14px;border-radius:14px;cursor:pointer;transition:.18s;box-shadow:inset 0 1px 0 rgba(255,255,255,.03)}
    .topnav button:hover,.topnav button.active{background:linear-gradient(180deg,#18304b,#12253b);border-color:#4f7db1;transform:translateY(-1px);box-shadow:0 10px 20px rgba(0,0,0,.18)}
    .topnav button.market-disabled{opacity:.72}
    .nav-ico{width:20px;height:20px;display:grid;place-items:center;border-radius:999px;background:rgba(255,255,255,.07);font-size:.88rem}
    .topnav button.active .nav-ico{background:rgba(125,182,255,.18)}
    .app{display:grid;grid-template-columns:310px 1fr;min-height:calc(100vh - 77px)}
    .sidebar{padding:18px 14px 24px;border-right:1px solid var(--line);background:linear-gradient(180deg,rgba(10,18,30,.92),rgba(8,14,24,.98));position:sticky;top:77px;height:calc(100vh - 77px);overflow:auto}
    .mobile-sidebar-head{display:none;justify-content:space-between;align-items:center;margin-bottom:12px}
    .mobile-sidebar-head button{border:1px solid var(--line);background:#10233a;color:var(--text);border-radius:12px;padding:8px 12px;cursor:pointer}
    .sidebar h3{margin:0 0 12px;font-size:.82rem;color:#7fd6ff;letter-spacing:.16em;text-transform:uppercase}
    .macro{margin-bottom:10px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.03);overflow:hidden}
    .macro button.head{width:100%;display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:transparent;border:0;color:var(--text);font-weight:700;cursor:pointer}
    .macro button.head span:last-child{color:var(--muted);font-size:1.1rem}
    .subs{display:none;padding:0 10px 12px 10px}
    .macro.open .subs{display:grid;gap:8px}
    .subs button{width:100%;text-align:left;border:1px solid transparent;background:#0b1727;color:var(--text);padding:11px 13px;border-radius:12px;cursor:pointer}
    .subs button.active{border-color:#396592;background:#13263c}
    .subs button.disabled{opacity:.55;cursor:not-allowed}
    .content{padding:22px 22px 40px}
    .hero{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(260px,.6fr);gap:16px;margin-bottom:18px}
    .card{background:linear-gradient(180deg,rgba(17,31,49,.96),rgba(9,18,30,.98));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease}
    .card:hover{border-color:rgba(118,165,225,.22);box-shadow:0 22px 48px rgba(0,0,0,.28)}
    .hero-main,.hero-side,.section,.notice{padding:22px}
    h1{margin:0 0 8px;font-size:2.45rem;line-height:1.05} h2{margin:0 0 12px;font-size:1.16rem} h3{margin:0 0 10px;font-size:1rem}
    p{margin:0;color:#d8e0ec;line-height:1.6}.muted{color:var(--muted)} .small{font-size:.92rem}
    .pills,.team-pills,.subnav,.mini-tabs{display:flex;gap:8px;flex-wrap:wrap}
    .pill,.subnav button,.mini-tabs button{padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid transparent;font-size:.9rem}
    .subnav button,.mini-tabs button{cursor:pointer;color:var(--text)} .subnav button.active,.mini-tabs button.active{background:#18304e;border-color:#386692}
    .kpi{display:grid;gap:10px}
    .kpi .row,.feature,.market-item,.ranking-row,.team-item,.event,.lineup,.stat,.directory-card,.news-card,.mini-card{padding:13px 14px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.05)}
    .toolbar{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
    .tabs{display:flex;gap:8px;flex-wrap:wrap}
    .tabs button{background:#0b1930;color:var(--text);border:1px solid var(--line-strong);border-radius:12px;padding:10px 14px;cursor:pointer}.tabs button.active{background:#17304f;border-color:#4172a9}
    .search{background:#081625;border:1px solid var(--line-strong);color:var(--text);border-radius:14px;padding:10px 14px;min-width:260px;outline:none}
    .list,.grid{display:grid;gap:12px}.grid2{grid-template-columns:1.18fr .82fr}.grid3{grid-template-columns:repeat(3,1fr)}.grid4{grid-template-columns:repeat(4,1fr)}
    .match{padding:16px 18px;cursor:pointer;transition:.18s}.match:hover,.directory-card:hover{border-color:#3e78b7;transform:translateY(-1px)}
    .rowflex{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:flex-start}.title{font-size:1.12rem;font-weight:700;margin-top:6px}
    .badges{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.badge,.scorebadge{padding:8px 12px;border-radius:999px;font-size:.82rem;font-weight:700;background:rgba(255,255,255,.08)}
    .live{background:rgba(255,113,74,.16);color:#ffd1b2;border:1px solid rgba(255,179,71,.22)} .finished{background:rgba(35,193,106,.14);color:#9af0bc} .scheduled{background:rgba(255,207,87,.14);color:#ffe18a}
    .live-dot{display:inline-block;width:8px;height:8px;border-radius:999px;background:linear-gradient(90deg,#ff7a59,#ffb347);margin-right:8px;box-shadow:0 0 12px rgba(255,122,89,.8);animation:pulse 1.2s infinite}
    @keyframes pulse{0%{transform:scale(1);opacity:1}50%{transform:scale(1.25);opacity:.7}100%{transform:scale(1);opacity:1}}
    .bar{height:10px;background:#091625;border-radius:999px;overflow:hidden;border:1px solid rgba(255,255,255,.05)} .fill{height:100%;background:linear-gradient(90deg,#22c55e,#6ee7b7)}
    .players{display:grid;gap:8px}.player{padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.05)}
    .back{display:inline-block;margin-bottom:12px;color:#c7d8eb;cursor:pointer}.footer-note{margin-top:14px;color:var(--muted);font-size:.9rem}
    table{width:100%;border-collapse:collapse} th,td{padding:10px 8px;border-bottom:1px solid rgba(255,255,255,.06);text-align:left} tr:hover td{background:rgba(255,255,255,.02)}
    .standing-top td:first-child{border-left:4px solid #1fbf75}
    .standing-mid td:first-child{border-left:4px solid #f3c95f}
    .standing-bottom td:first-child{border-left:4px solid #d95454}
    .standing-tag{display:inline-flex;padding:4px 8px;border-radius:999px;font-size:.72rem;font-weight:800;margin-left:8px;background:rgba(255,255,255,.08)}
    .linklike{cursor:pointer}.linklike:hover{text-decoration:underline}
    .paypal-btn,.discord-btn,.ghost-btn{display:inline-block;margin-top:16px;padding:12px 18px;border-radius:14px;background:linear-gradient(90deg,#0ea5e9,#2563eb);color:white;text-decoration:none;font-weight:700;border:0;cursor:pointer}
    .ghost-btn{background:#11243a;border:1px solid var(--line-strong)}
    .hero-list{display:grid;gap:10px;margin-top:14px}.hero-list .feature{display:flex;justify-content:space-between;gap:10px;align-items:center}
    .ranking-row{display:grid;grid-template-columns:56px 1fr auto;gap:14px;align-items:center}
    .ranking-rank{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;background:#10233a;font-weight:800;color:#cde3ff;border:1px solid var(--line)}
    .market-meta,.ranking-meta,.directory-meta{color:var(--muted);font-size:.9rem;margin-top:4px}
    .split{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .notice{font-size:.98rem}
    .directory-card{cursor:pointer}
    .team-header{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap}
    .team-brand{display:flex;gap:16px;align-items:center}
    .team-brand img{width:84px;height:84px;object-fit:contain;border-radius:18px;padding:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)}
    .team-form{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .form-chip{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-weight:900;border:1px solid rgba(255,255,255,.08)}
    .form-chip.win{background:rgba(31,191,117,.18);color:#c7f8de}
    .form-chip.draw{background:rgba(243,201,95,.18);color:#ffeeb6}
    .form-chip.loss{background:rgba(217,84,84,.16);color:#ffd0d0}
    .team-hero-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:18px}
    .team-hero-grid .feature{min-height:88px}
    .tab-shell{margin-top:14px}
    .news-card a{color:#dff0ff;text-decoration:none}
    .news-card a:hover{text-decoration:underline}
    .section-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;flex-wrap:wrap;margin-bottom:14px}
    .match-month{font-size:1.16rem;font-weight:900;text-transform:capitalize;color:#ffffff;margin:18px 0 10px;padding:10px 14px;border-left:4px solid #3ca86a;background:rgba(255,255,255,.04);border-radius:12px}
    .match-date{font-size:1rem;font-weight:800;text-transform:capitalize;color:#dff0ff;margin:16px 0 10px;padding:8px 12px;background:rgba(14,28,44,.95);border:1px solid rgba(255,255,255,.08);border-radius:12px}
    .team-directory-hero{display:grid;grid-template-columns:1.1fr .9fr;gap:16px;margin-bottom:18px}
    .team-highlight-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
    .directory-card{position:relative;overflow:hidden;min-height:160px;background:linear-gradient(180deg,rgba(18,34,53,.95),rgba(10,19,31,.98))}
    .directory-card:after{display:none}
    .directory-card strong{font-size:1.08rem}
    .directory-kpi{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .directory-kpi span{padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.06);font-size:.82rem;color:#dcecff}
    .support-wrap{display:grid;grid-template-columns:1.18fr .82fr;gap:18px}
    .support-story{display:grid;gap:14px}
    .support-long p{margin-bottom:14px}
    .tricolor-band{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}
    .tricolor-band div{padding:14px;border-radius:18px;border:1px solid rgba(255,255,255,.08);font-weight:800;text-align:center}
    .tricolor-band .green{background:linear-gradient(135deg,rgba(16,94,58,.95),rgba(18,129,74,.85))}
    .tricolor-band .white{background:linear-gradient(135deg,rgba(240,245,251,.96),rgba(210,222,237,.94));color:#142235}
    .tricolor-band .red{background:linear-gradient(135deg,rgba(128,29,41,.95),rgba(186,49,68,.9))}
    .support-visual{display:grid;gap:12px}
    .support-banner{position:relative;overflow:hidden;padding:20px;border-radius:22px;background:linear-gradient(135deg,rgba(15,53,89,.95),rgba(10,101,74,.92));border:1px solid rgba(255,255,255,.08);min-height:190px}
    .support-banner:before{content:'❤';position:absolute;right:22px;top:18px;font-size:4rem;opacity:.12}
    .support-banner:after{content:'⚽';position:absolute;left:18px;bottom:8px;font-size:4.5rem;opacity:.09}
    .support-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .support-box{padding:16px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
    .market-shell{display:grid;gap:16px}
    .market-item{position:relative;overflow:hidden;padding:16px 18px;background:linear-gradient(180deg,rgba(18,34,53,.96),rgba(9,18,30,.98))}
    .market-item:after{display:none}
    .market-item strong{font-size:1.04rem}
    .market-badge{display:inline-flex;padding:6px 10px;border-radius:999px;font-size:.8rem;font-weight:800;background:rgba(51,209,122,.12);border:1px solid rgba(51,209,122,.22);color:#baf2cf;margin-bottom:8px}
    
    .macro-grid,.quick-grid,.home-grid,.top-grid{display:grid;gap:12px;grid-template-columns:repeat(3,1fr)}
    .macro-tile,.quick-card,.home-card,.top-card{padding:16px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)}
    .macro-tile strong,.quick-card strong,.home-card strong,.top-card strong{display:block;margin-bottom:6px}
    .macro-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .macro-actions button{padding:9px 12px;border-radius:12px;border:1px solid var(--line-strong);background:#0c192b;color:var(--text);cursor:pointer}
    .hero-home{display:grid;grid-template-columns:1.15fr .85fr;gap:16px;margin-bottom:18px}
    .hero-cta{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
    .hero-cta button{padding:11px 14px;border-radius:14px;border:1px solid var(--line-strong);background:#10233a;color:var(--text);cursor:pointer;font-weight:700}
    .home-grid{margin-top:16px}
    .home-card{min-height:132px}
    .home-card em,.top-card em{display:inline-flex;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.06);font-style:normal;font-size:.82rem;color:#d6e6fb;border:1px solid rgba(255,255,255,.06);margin-bottom:10px}
    .top-grid{margin-top:16px}
    .top-card{cursor:pointer;transition:.18s;position:relative;overflow:hidden}
    .top-card:hover,.top-card.active{border-color:#4f7db1;transform:translateY(-1px);background:linear-gradient(180deg,rgba(25,49,77,.85),rgba(10,20,34,.98))}
    .top-card:after{display:none}
    .hero-glow{position:relative;overflow:hidden}
    .hero-glow:before{display:none}
    .empty-shell{display:grid;gap:16px}
    .select-note{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid var(--line);font-size:.92rem;color:#dce7f6}
    .section-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:12px}
    .match-month{margin:18px 0 10px;font-size:1.1rem;font-weight:800;letter-spacing:.02em;color:#f7fbff;text-transform:capitalize}
    .match-date{margin:10px 0 8px;padding:8px 12px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);font-size:.98rem;font-weight:800;color:#ffffff;text-transform:capitalize}
    .top-overview{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px;margin-top:18px;align-items:start}
    .value-wide{grid-template-columns:minmax(0,1.7fr) minmax(280px,.6fr)}
    .value-wide .top-table{width:100%}
    .value-wide .top-mini-table td:last-child,.value-wide .top-mini-table th:last-child{text-align:right}
    .value-wide .top-mini-table .namecol{width:70%}
    .top-table{padding:0;overflow:hidden;border-radius:22px;border:1px solid var(--line);box-shadow:var(--shadow);min-width:0}
    .top-table.red{background:linear-gradient(180deg,rgba(134,21,21,.34),rgba(14,17,26,.98))}
    .top-table.white{background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(16,19,26,.98))}
    .top-table.green{background:linear-gradient(180deg,rgba(13,113,63,.34),rgba(10,18,26,.98))}
    .top-table-head{padding:16px 18px;border-bottom:1px solid rgba(255,255,255,.12)}
    .top-table-head em{display:inline-flex;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.12);font-style:normal;font-size:.8rem;font-weight:700;margin-bottom:8px}
    .top-mini-table{width:100%;border-collapse:collapse}
    .top-mini-table th,.top-mini-table td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
    .top-mini-table th{font-size:.82rem;text-transform:uppercase;letter-spacing:.08em;color:#deebfb}
    .top-table.green{background:linear-gradient(180deg,rgba(10,63,40,.98),rgba(7,34,24,.98));border:1px solid rgba(45,176,108,.28)}
    .top-table.white{background:linear-gradient(180deg,rgba(236,243,249,.98),rgba(207,220,235,.96));color:#13233a;border:1px solid rgba(255,255,255,.55)}
    .top-table.white .muted,.top-table.white .directory-meta,.top-table.white .player-team-line,.top-table.white .footer-note,.top-table.white th{color:#34506e}
    .top-table.red{background:linear-gradient(180deg,rgba(102,23,32,.98),rgba(58,13,20,.98));border:1px solid rgba(218,82,100,.28)}
    .top-table-head em{display:inline-flex;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.11);font-style:normal;font-size:.78rem;font-weight:900;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
    .top-table.white .top-table-head em{background:rgba(20,35,58,.08)}
    .top-mini-table tbody tr:last-child td{border-bottom:0}
    .top-mini-table td:first-child{width:54px;font-weight:800}
    .top-mini-table td:last-child{text-align:right;font-weight:800}
    .top-mini-table .namecol{min-width:0}
    .player-main{display:flex;align-items:center;gap:10px;min-width:0}
    .shirt-badge{display:inline-flex;align-items:center;justify-content:center;min-width:38px;height:38px;padding:0 10px;border-radius:12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);font-size:.84rem;font-weight:800;color:#fff;flex:0 0 auto}
    .player-stack{display:flex;flex-direction:column;gap:4px;min-width:0}
    .player-stack strong{display:block;white-space:normal;line-height:1.2}
    .player-team-line{display:flex;flex-wrap:wrap;gap:8px;align-items:center;color:var(--muted);font-size:.88rem}
    .player-team-line .sep{opacity:.55}
    .value-pill{display:inline-flex;align-items:center;justify-content:center;min-width:72px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);font-weight:900}
    .top-table.red .value-pill{background:rgba(255,255,255,.1)}
    .top-table.white .value-pill{background:rgba(255,255,255,.16)}
    .top-table.green .value-pill{background:rgba(255,255,255,.1)}
    .home-highlight{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}
    .home-highlight .feature{min-height:110px}

    @media (max-width:1180px){.app{grid-template-columns:1fr}.sidebar{position:relative;top:0;height:auto;border-right:0;border-bottom:1px solid var(--line)}.hero,.grid2,.grid3,.grid4,.split,.macro-grid,.quick-grid,.hero-home,.top-overview,.home-highlight,.team-directory-hero,.support-wrap,.support-grid,.team-highlight-grid{grid-template-columns:1fr}}
    @media (max-width:920px){
      .topbar{padding:12px 14px;align-items:flex-start}
      .topbar-actions{margin-left:auto}
      .hamburger,.sidebar-toggle{display:inline-flex}
      .topnav{display:none;position:absolute;right:14px;top:72px;flex-direction:column;align-items:stretch;min-width:240px;padding:10px;background:rgba(8,16,27,.98);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}
      body.mobile-nav-open .topnav{display:flex}
      .topnav button{width:100%;justify-content:flex-start}
      .app{display:block}
      .sidebar{display:none;position:fixed;left:0;top:77px;bottom:0;width:min(86vw,340px);z-index:45;box-shadow:var(--shadow)}
      body.mobile-sidebar-open .sidebar{display:block}

function renderStat(stats,name,labelOverride){

  const label = labelOverride || STAT_LABELS[name] || name;
  const homeNum = parseNum(home), awayNum = parseNum(away), total = homeNum + awayNum || 1;
  const hp = Math.max(6, (homeNum/total)*100), ap = Math.max(6, (awayNum/total)*100);
  return `<div class="stat"><div class="rowflex"><strong>${esc(label)}</strong><span class="muted small">${esc(home)} - ${esc(away)}</span></div><div style="display:grid;grid-template-columns:${hp}% ${ap}%;gap:8px;margin-top:10px"><div class="bar"><div class="fill"></div></div><div class="bar"><div class="fill" style="opacity:.45"></div></div></div></div>`;
}

    ? 'Vista dedicata alla Nazionale: qui trovi partite in corso, prossimi impegni e risultati recenti dell\'Italia, senza scheda rosa o dati club.'
    : 'Vista principale della competizione con partite, classifica, schede squadra e statistiche tradotte in italiano. Puoi cambiare categoria dal menu laterale in qualsiasi momento oppure tornare alla Home pulita dal menu alto.';
  const pills = teamMode
    ? '<span class="pill">Partite Italia</span><span class="pill">Prossime</span><span class="pill">In corso</span><span class="pill">Risultati recenti</span>'
    : '<span class="pill">Live</span><span class="pill">Classifica</span><span class="pill">Dettagli partita</span><span class="pill">Schede squadra</span>' ;
  const rightLabel = teamMode ? 'Sezione attiva' : 'Competizione attiva';
  const rightValue = teamMode ? 'Nazionali' : esc(state.competition);
  return `<div class="content">${state.competition ? `<div class="hero"><div class="card hero-main"><div class="muted small">${esc(currentMacro())} • ${esc(state.competition)}</div><h1>${esc(state.competition)}</h1><p>${intro}</p><div class="pills">${pills}</div></div><div class="card hero-side"><h2>Stato rapido</h2><div class="kpi"><div class="row"><strong>${rightLabel}</strong><div class="muted small">${rightValue}</div></div><div class="row"><strong>Partite caricate</strong><div class="muted small">${state.fixtures.length || '—'}</div></div><div class="row"><strong>Ordine</strong><div class="muted small">Più recenti in alto</div></div></div></div></div><div class="grid ${teamMode ? 'grid1' : 'grid2'}">${matchesList()}${teamMode ? '' : standingsCard()}</div>` : homeLanding()}</div>`;
}


function renderMatchesGrouped(list){
  const months = new Map();
  list.forEach(m => {
    const mk = monthKey(m.fixture.date);
    if(!months.has(mk)) months.set(mk, { label: monthLabel(m.fixture.date), days:new Map() });
    const month = months.get(mk);
    const dk = new Date(m.fixture.date).toISOString().slice(0,10);
    if(!month.days.has(dk)) month.days.set(dk, { label: localDateLong(m.fixture.date), items:[] });
    month.days.get(dk).items.push(m);
  });
  return [...months.entries()].map(([_, month]) => `<div><div class="match-month">${esc(month.label)}</div>${[...month.days.entries()].map(([__, day]) => `<div class="match-date">${esc(day.label)}</div><div class="list">${day.items.map(m=>`<div class="card match" onclick="openMatch(${m.fixture.id})"><div class="rowflex"><div><div class="muted small">${esc(m.league.name)} • ${localDate(m.fixture.date)}</div><div class="title">${esc(m.teams.home.name)} vs ${esc(m.teams.away.name)}</div></div><div class="badges"><span class="badge ${statusClass(m.fixture.status.short)}">${statusLabel(m)}</span><span class="scorebadge">${m.goals.home ?? '-'} - ${m.goals.away ?? '-'}</span></div></div></div>`).join('')}</div>`).join('')}</div>`).join('');
}

function matchesList(){
  const allFixtures = state.fixtures || [];
  const liveList = sortByDateDesc(allFixtures.filter(m=>statusClass(m.fixture.status.short)==='live'));
  const nextListFull = sortByDateAsc(allFixtures.filter(m=>statusClass(m.fixture.status.short)==='scheduled'));
  const nextList = nextListFull.slice(0,10);
  const finishedList = sortByDateDesc(allFixtures.filter(m=>statusClass(m.fixture.status.short)==='finished')).slice(0,10);

  let list = [];
  let note = 'Live in evidenza + massimo 10 prossime partite. Le partite finite restano separate nella tab Finite.';
  if(state.filter==='live'){ list = liveList; note = 'Solo partite live.'; }
  else if(state.filter==='next'){ list = nextList; note = 'Mostrate solo le prossime 10 partite, ordinate dalla più vicina.'; }
  else if(state.filter==='finished'){ list = finishedList; note = 'Mostrate solo le 10 partite finite più recenti, così eventi e statistiche restano più utili e leggibili.'; }
  else { list = [...liveList, ...nextList]; }

  if(state.search.trim()){
    const q=state.search.toLowerCase();
    list=list.filter(m=>m.teams.home.name.toLowerCase().includes(q)||m.teams.away.name.toLowerCase().includes(q));
  }

  const euroMode = state.meta?.italianTeamsOnly && ['champions-league','europa-league','conference-league'].includes(currentCode());
  const euroEliminated = !!state.meta?.europeEliminated;
  const euroEmptyMessage = euroMode && euroEliminated && state.filter !== 'finished'
    ? `<div class="notice"><strong>Tutte le squadre italiane sono state eliminate dalla competizione.</strong><div class="footer-note">Nelle schede Tutte, Live e Prossime non c'è più nulla da mostrare. Apri Finite per rivedere le ultime partite delle italiane.</div></div>`
    : '';

  const euroSummary = state.meta?.recentItalianResults?.length && state.filter==='finished'
    ? `<div class="card section" style="margin-bottom:12px"><h2>Ultimi risultati delle italiane</h2><div class="list">${state.meta.recentItalianResults.map(tie=>`<div class="market-item"><div class="rowflex"><div><strong>${esc(tie.home.name)} ${tie.home.score} (${tie.home.aggregate}) ${tie.home.qualified ? '↑' : ''}</strong></div><div class="muted small">${tie.legs===2?'Andata / ritorno':'Partita secca'}</div></div><div style="margin-top:8px"><strong>${esc(tie.away.name)} ${tie.away.score} (${tie.away.aggregate}) ${tie.away.qualified ? '↑' : ''}</strong></div></div>`).join('')}</div></div>`
    : '';

  const hideMatchesBecauseEliminated = euroMode && euroEliminated && state.filter !== 'finished';
  const visibleList = hideMatchesBecauseEliminated ? [] : list;

  const body = !visibleList.length
    ? `${euroEmptyMessage}${euroSummary}<div class="notice">${hideMatchesBecauseEliminated ? 'Nessuna partita da mostrare in questa tab.' : 'Nessuna partita trovata per i filtri selezionati.'}</div>`
    : ((state.filter==='finished' || state.filter==='live') 
      ? `${euroEmptyMessage}${euroSummary}<div class="list">${visibleList.map(m=>`<div class="card match" onclick="openMatch(${m.fixture.id})"><div class="rowflex"><div><div class="muted small"><strong>${localDateLong(m.fixture.date)}</strong> • ${esc(m.league.name)} • ${localDate(m.fixture.date)}</div><div class="title">${esc(m.teams.home.name)} vs ${esc(m.teams.away.name)}</div></div><div class="badges"><span class="badge ${statusClass(m.fixture.status.short)}">${statusLabel(m)}</span><span class="scorebadge">${m.goals.home ?? '-'} - ${m.goals.away ?? '-'}</span></div></div></div>`).join('')}</div>`
      : `${euroEmptyMessage}${euroSummary}${renderMatchesGrouped(visibleList)}`);
  return `<div class="card section"><div class="section-head"><div><h2 style="margin-bottom:4px">Partite</h2><div class="muted small">${note}</div></div><div class="muted small">${state.fixtures.length ? state.fixtures.length+' incontri disponibili' : 'Nessun incontro caricato'}</div></div>${toolbar()}${state.loading?`<div class="notice">Caricamento partite...</div>`:state.error?`<div class="notice">${esc(state.error)}</div>`:body}</div>`;
}

function standingsCard(){
  const code = currentCode();
  const euro = ['champions-league','europa-league','conference-league'].includes(code);
  const noItalian = state.standingsMeta && state.standingsMeta.noItalianTeams && euro;
  const labelForRow = rank => {
    const r = Number(rank || 0);
    if(euro) return '';
    if(code==='serie-a'){
      if(r<=4) return '<span class="standing-tag">Champions League</span>';
      if(r===5) return '<span class="standing-tag">Europa League</span>';
      if(r===6) return '<span class="standing-tag">Conference League</span>';
      if(r>=18) return '<span class="standing-tag">Retrocessione</span>';
      return '';
    }
    if(code==='serie-b'){
      if(r<=2) return '<span class="standing-tag">Promozione</span>';
      if(r>=3 && r<=8) return '<span class="standing-tag">Playoff</span>';
      if(r===16 || r===17) return '<span class="standing-tag">Playout</span>';
      if(r>=18) return '<span class="standing-tag">Retrocessione</span>';
      return '';
    }
    if(['serie-c-girone-a','serie-c-girone-b','serie-c-girone-c'].includes(code)){
      if(r===1) return '<span class="standing-tag">Promozione</span>';
      if(r>=2 && r<=10) return '<span class="standing-tag">Playoff</span>';
      if(r===16) return '<span class="standing-tag">Playout</span>';
      if(r>=17) return '<span class="standing-tag">Retrocessione</span>';
      return '';
    }
    if(['serie-d-girone-a','serie-d-girone-b','serie-d-girone-c','serie-d-girone-d','serie-d-girone-e','serie-d-girone-f','serie-d-girone-g','serie-d-girone-h','serie-d-girone-i'].includes(code)){
      if(r===1) return '<span class="standing-tag">Promozione</span>';
      if(r>=2 && r<=5) return '<span class="standing-tag">Playoff</span>';
      if(r>=16) return '<span class="standing-tag">Retrocessione</span>';
      return '';
    }
    return '';
  };
  return `<div class="card section"><div class="rowflex" style="margin-bottom:10px"><h2>Classifica</h2><div class="muted small">${esc(state.competition)}</div></div>${state.standingsLoading?`<div class="notice">Caricamento classifica...</div>`:!state.standings.length?`<div class="notice">${noItalian ? 'Nessuna squadra italiana ancora presente nella classifica attuale della competizione.' : 'Classifica non disponibile per questa categoria.'}</div>`:`<table><thead><tr><th>#</th><th>Squadra</th><th>PT</th><th>G</th><th>V</th><th>N</th><th>P</th><th>DR</th></tr></thead><tbody>${state.standings.map((r,i)=>`<tr class="${standingRowClass(r.displayRank || r.rank)}"><td>${r.displayRank || r.rank || (i+1)}</td><td>${teamLink(r.team.name,r.team.id)} ${labelForRow(r.displayRank || r.rank)}</td><td>${r.points}</td><td>${r.all.played}</td><td>${r.all.win}</td><td>${r.all.draw}</td><td>${r.all.lose}</td><td>${r.goalsDiff}</td></tr>`).join('')}</tbody></table>`}</div>`;
}

function teamTabOverview(d){
  const fixturesDesc=sortByDateDesc(d.fixtures||[]);

    return `<span class="form-chip ${cls}">${res}</span>`;

function rankingCard(item, idx, type){
  const player = item.player || {};
  const stats = item.statistics?.[0] || {};
  const team = stats.team?.name || 'Squadra';
  const val = type==='scorers' ? (stats.goals?.total ?? 0) : type==='assists' ? (stats.goals?.assists ?? 0) : (stats.games?.rating || '—');
  const suffix = type==='ratings' ? '' : (type==='assists' ? ' assist' : ' gol');
  return `<div class="ranking-row"><div class="ranking-rank">${idx+1}</div><div><strong>${esc(player.name || 'Giocatore')}</strong><div class="ranking-meta">${esc(team)} • Presenze: ${stats.games?.appearences ?? stats.games?.appearances ?? '—'}</div></div><div><strong>${esc(val)}${suffix}</strong></div></div>`;
}

function rankingValue(type, stats){
  if(type==='scorers') return stats.goals?.total ?? 0;
  if(type==='assists') return stats.goals?.assists ?? 0;
  const raw = Number.parseFloat(String(stats.games?.rating || '').replace(',', '.'));
  return Number.isFinite(raw) ? raw.toFixed(1).replace('.', ',') : '—';
}

function rankingLabel(type){
  return type==='scorers' ? 'Gol' : type==='assists' ? 'Assist' : 'Valut.';
}

function rankingView(type){
  const list = state.rankings[type] || [];
  const loading = state.rankingsLoading[type];
  const note = state.rankingsNote[type];
  if(loading) return `<div class="directory-meta">Caricamento classifica...</div>`;
  if(!state.competition) return `<div class="directory-meta">Seleziona prima una competizione dal menu laterale.</div>`;
  if(!list.length) return `<div class="directory-meta">Nessun dato disponibile.</div>${note?`<div class="footer-note">${esc(note)}</div>`:''}`;
  return `<table class="top-mini-table"><thead><tr><th>#</th><th>Giocatore</th><th>${rankingLabel(type)}</th></tr></thead><tbody>${list.slice(0,10).map((item,idx)=>{ 
    const player = item.player || {}; 
    const stats = item.statistics?.[0] || {}; 
    const team = stats.team?.name || 'Squadra'; 
    const value = rankingValue(type, stats);
    const appearances = stats.games?.appearences ?? stats.games?.appearances ?? '—';
    return `<tr><td>${idx+1}</td><td class="namecol"><div class="player-main"><div class="player-stack"><strong>${esc(player.name || 'Giocatore')}</strong><div class="player-team-line"><span>${esc(team)}</span><span class="sep">•</span><span>Presenze: ${esc(appearances)}</span></div></div></div></td><td><span class="value-pill">${esc(value)}</span></td></tr>`; 
  }).join('')}</tbody></table>${note?`<div class="footer-note">${esc(note)}</div>`:''}`;
}

function loadAllRankings(){
  ['scorers','assists','ratings'].forEach(loadRanking);

function formatValueEuro(v){
  const n = Number(v || 0);
  if(!Number.isFinite(n) || n <= 0) return '—';
  if(n >= 1000000) return `€${(n/1000000).toFixed(1).replace('.', ',')} M`;
  if(n >= 1000) return `€${Math.round(n/1000)} mila`;
  return `€${Math.round(n)}`;
}

  state.selected=null; state.meta=null; state.standings=[]; state.standingsMeta=null; state.standingsLoading=false; state.selectedTeam=null; state.teamData=null; state.teamLoading=false;
  state.teamDirectorySearch=''; state.teamTab='overview'; state.marketTab='official'; state.topTab='scorers'; state.values=[]; state.valuesLoading=false; state.valuesNote='';
}
function setPage(page){
  if(page==='home'){ resetToHome(); render(); syncHistory(); return; }
  state.page=page; state.selected=null; state.selectedTeam=null; state.teamDirectorySearch=''; render(); syncHistory();
  if(page==='top') loadAllRankings();

  if(!state.competition) return;

}
function selectCompetition(name){
  const item = allItems.find(i => i.name===name);
  const group = CATEGORY_TREE.find(g => g.items.some(i => i.name===name));
  state.openMacro = group?.key || state.openMacro; state.competition=name; state.filter='all'; state.search='';
  state.fixtures=[]; state.selected=null; state.selectedTeam=null; state.teamData=null; state.meta=null; state.standings=[]; state.standingsMeta=null; state.teamDirectorySearch=''; state.teamTab='overview';
  if((item?.mode==='team' || item?.mode==='national-competition') && item?.teamId){
    state.page='competition';
    state.fixtures=[]; state.meta=null; state.standings=[];
    syncHistory();
    loadCompetitionData();
    return;
  }
  state.page='competition';
  if(window.innerWidth<=920) document.body.classList.remove('mobile-sidebar-open');
  syncHistory();
  loadCompetitionData();
}
async function openNationalTeam(teamId, teamName){
  state.selected=null; state.selectedTeam={id:teamId,name:teamName}; state.teamLoading=true; state.teamData=null; state.teamTab='overview'; render();
  try{ const res=await fetch(`/api/national-team?team=${teamId}`); const data=await res.json(); if(!res.ok) throw new Error(data.error || 'Errore nel caricamento squadra nazionale'); state.teamData=data; }
  catch(err){ state.teamData={error:err.message || 'Errore nel caricamento squadra nazionale'}; }
  state.teamLoading=false; render(); syncHistory(true);
}

async function loadFixturesOnly(){
  if(currentMode()==='team' || currentMode()==='national-competition'){
    const teamId = currentItem()?.teamId;
    if(!teamId){ state.fixtures=[]; state.meta=null; return; }
    const compParam = currentMode()==='national-competition' ? `&competition=${encodeURIComponent(currentCode())}` : '';
    const res = await fetch(`/api/national-fixtures?team=${teamId}${compParam}`);
    const data = await res.json(); if(!res.ok) throw new Error(data.error || 'Errore nel caricamento');
    state.fixtures = data.fixtures || []; state.meta = data.debug || null;
    return;
  }
  if(!currentCode()) { state.fixtures=[]; state.meta=null; return; }
  const res = await fetch(`/api/fixtures?competition=${encodeURIComponent(currentCode())}`);
  const data = await res.json(); if(!res.ok) throw new Error(data.error || 'Errore nel caricamento');
  state.fixtures = data.fixtures || []; state.meta = data.debug || null;
}
async function loadStandings(){
  if(currentMode()==='team' || currentMode()==='national-competition'){ state.standings=[]; state.standingsMeta=null; state.standingsLoading=false; render(); return; }
  if(!currentCode()) { state.standings=[]; state.standingsMeta=null; state.standingsLoading=false; render(); return; }
  state.standingsLoading=true; render();
  try{ const res = await fetch(`/api/standings?competition=${encodeURIComponent(currentCode())}`); const data = await res.json(); if(!res.ok) throw new Error(data.error || 'Errore classifica'); state.standings = data.standings || []; state.standingsMeta = data.debug || null; }
  catch(err){ state.standings=[]; state.standingsMeta=null; }
  state.standingsLoading=false; render();
}
async function loadCompetitionData(){
  state.loading=true; state.error=''; render();
  try{ await loadFixturesOnly(); }
  catch(err){ state.fixtures=[]; state.meta=null; state.error=err.message || 'Errore nel caricamento'; }
  state.loading=false; render(); loadStandings();
}

async function loadRanking(type){
  if(!currentCode()) { state.rankings[type]=[]; state.rankingsNote[type]='Seleziona una competizione per caricare la classifica.'; render(); return; }
  if(state.rankingsLoading[type]) return;
  state.rankingsLoading[type]=true; render();
  try{
    const endpoint = type==='ratings' ? '/api/ratings' : `/api/players?type=${type==='scorers'?'scorers':'assists'}`;
    const res = await fetch(`${endpoint}${endpoint.includes('?')?'&':'?'}competition=${encodeURIComponent(currentCode())}`);
    const raw = await res.text();
    let data = {};
    try { data = raw ? JSON.parse(raw) : {}; } catch(parseErr) { throw new Error(type==='ratings' ? 'Valutazioni momentaneamente non disponibili.' : 'Classifica momentaneamente non disponibile.'); }
    if(!res.ok) throw new Error(data.error || 'Errore caricamento classifica');
    state.rankings[type] = data.players || []; state.rankingsNote[type] = data.note || '';
  }catch(err){ state.rankings[type] = []; state.rankingsNote[type] = err.message || 'Errore nel caricamento'; }
  state.rankingsLoading[type]=false; render();
}
async function loadValues(){
  if(!currentCode()) { state.values=[]; state.valuesLoading=false; state.valuesNote='Seleziona prima una competizione dal menu laterale.'; render(); return; }
  if(state.valuesLoading) return;
  state.valuesLoading = true; render();
  try{
    const res = await fetch(`/api/value?competition=${encodeURIComponent(currentCode())}`);
    const raw = await res.text();
    let data = {};
    try { data = raw ? JSON.parse(raw) : {}; } catch(parseErr) { throw new Error('Valori stimati momentaneamente non disponibili.'); }
    if(!res.ok) throw new Error(data.error || 'Errore caricamento valori');
    state.values = data.players || [];
    state.valuesNote = data.note || '';
  }catch(err){ state.values = []; state.valuesNote = err.message || 'Errore nel caricamento'; }
  state.valuesLoading = false; render();
}
async function loadTransfers(){
  if(!currentCode()) { state.transfers=[]; state.transfersNote='Seleziona una competizione per caricare il mercato ufficiale.'; render(); return; }
  if(state.transfersLoading) return;
  state.transfersLoading=true; render();
  try{ const res = await fetch(`/api/transfers?competition=${encodeURIComponent(currentCode())}`); const raw = await res.text(); let data = {}; try { data = raw ? JSON.parse(raw) : {}; } catch(parseErr) { throw new Error('Mercato momentaneamente non disponibile.'); } if(!res.ok) throw new Error(data.error || 'Errore caricamento mercato'); state.transfers = data.transfers || []; state.transfersNote = data.note || ''; }
  catch(err){ state.transfers = []; state.transfersNote = err.message || 'Errore nel caricamento'; }
  state.transfersLoading=false; render();
}
async function openMatch(id){
  state.selectedTeam=null; state.teamData=null; state.selected={loading:true}; render(); syncHistory();
  try{
    const res=await fetch(`/api/match?id=${id}`);
    const data=await res.json().catch(()=> ({}));
    if(!res.ok) throw new Error(data.error || 'Errore nel dettaglio partita');
    state.selected={data};
  } catch(err){
    const fallbackMatch = (state.fixtures || []).find(m => String(m?.fixture?.id) === String(id));
    if(fallbackMatch){
      state.selected={data:{match:fallbackMatch,events:[],stats:[],lineups:[]}};
    } else {
      state.selected={error:err.message || 'Errore nel dettaglio partita'};
    }
  }
  render(); syncHistory(true);
}
function closeMatch(){ state.selected=null; render(); syncHistory(true); }
async function openTeam(teamId, teamName){
  state.selected=null; state.selectedTeam={id:teamId,name:teamName}; state.teamLoading=true; state.teamData=null; state.teamTab='overview'; render(); syncHistory();
  try{ const res=await fetch(`/api/team?competition=${encodeURIComponent(currentCode())}&team=${teamId}`); const data=await res.json(); if(!res.ok) throw new Error(data.error || 'Errore nel caricamento squadra'); state.teamData=data; }
  catch(err){ state.teamData={error:err.message || 'Errore nel caricamento squadra'}; }
  state.teamLoading=false; render();
}
function closeTeam(){ state.selectedTeam=null; state.teamData=null; state.teamLoading=false; state.teamTab='overview'; render(); syncHistory(true); }

window.addEventListener('mouseup', (event) => {
  if (event.button === 3) window.history.back();
  if (event.button === 4) window.history.forward();
});

window.addEventListener('popstate', (event) => {
  if(!event.state) return;
  state._historyLock = true;
  Object.assign(state, event.state);
  state._historyLock = false;
  render();
  if(state.page==='competition' && state.competition && !state.fixtures.length && !state.loading) loadCompetitionData();
});



document.addEventListener('click', e=>{
  if(window.innerWidth>920) return;
  if(!e.target.closest('.topnav,.hamburger')) document.body.classList.remove('mobile-nav-open');
  if(!e.target.closest('.sidebar,.sidebar-toggle')) document.body.classList.remove('mobile-sidebar-open');
});
window.addEventListener('resize', ()=>{
  if(window.innerWidth>920) document.body.classList.remove('mobile-nav-open','mobile-sidebar-open');
});

syncHistory(true);
render();

</script>
