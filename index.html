<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<title>Calcio Italiano Live</title>
<style>
body{background:#081523;color:white;font-family:Arial;padding:20px}
.card{background:#0f233c;padding:20px;border-radius:12px;margin-bottom:10px}
button{padding:10px;margin:5px}
</style>
</head>
<body>
<h1>Serie A Live</h1>
<div>
<button onclick="load()">Carica Partite</button>
</div>
<div id="app"></div>

<script>
async function load(){
  document.getElementById('app').innerHTML = "Caricamento...";
  try{
    const res = await fetch('/api/fixtures?competition=serie-a');
    const data = await res.json();
    if(!res.ok) throw new Error(data.error);

    const list = data.fixtures || [];
    if(!list.length){
      document.getElementById('app').innerHTML = "Nessuna partita trovata";
      return;
    }

    document.getElementById('app').innerHTML = list.map(m => `
      <div class="card">
        ${m.teams.home.name} vs ${m.teams.away.name}<br>
        ${m.goals.home ?? '-'} - ${m.goals.away ?? '-'}
      </div>
    `).join("");

  }catch(e){
    document.getElementById('app').innerHTML = "Errore: " + e.message;
  }
}
</script>
</body>
</html>
